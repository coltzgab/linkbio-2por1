<style>
:root{
  --lima:#CCFF00;
  --roxo:#7700CC;
  --preto:#0A0A0A;
  --branco:#F5F5F5;
  --surface:#141414;
  --muted:#7a7a7a;
  --text:#E8E8E8;
}

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  background:var(--preto);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
}

/* Grid background sutil */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(204,255,0,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(204,255,0,.025) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
  z-index:0;
}

/* Halo roxo no topo */
body::after{
  content:'';
  position:fixed;
  top:-20vh;
  left:50%;
  transform:translateX(-50%);
  width:80vw;
  height:60vh;
  background:radial-gradient(ellipse at center, rgba(119,0,204,.18) 0%, transparent 60%);
  pointer-events:none;
  z-index:0;
  filter:blur(40px);
}

main{
  position:relative;
  z-index:1;
  max-width:520px;
  margin:0 auto;
  padding:48px 20px 64px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* ─── HEADER ─── */
.header{
  text-align:center;
  margin-bottom:40px;
  width:100%;
}

.logo-wrap{
  width:min(340px, 78vw);
  margin:0 auto 28px;
  position:relative;
}

.logo-wrap svg{
  width:100%;
  height:auto;
  display:block;
  filter:drop-shadow(0 0 24px rgba(204,255,0,.15));
}

.tagline{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(20px,5vw,28px);
  letter-spacing:4px;
  color:var(--branco);
  line-height:1.15;
}
.tagline span{color:var(--lima);}

/* Glitch */
.glitch{
  position:relative;
  display:inline-block;
}
.glitch::before,
.glitch::after{
  content:attr(data-text);
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
}
.glitch::before{
  color:var(--lima);
  z-index:-1;
  animation:glitch-1 2.8s infinite steps(1);
  mix-blend-mode:screen;
}
.glitch::after{
  color:var(--roxo);
  z-index:-2;
  animation:glitch-2 3.2s infinite steps(1);
  mix-blend-mode:screen;
}
@keyframes glitch-1{
  0%,90%,100%{transform:translate(0,0);clip-path:inset(0 0 0 0);}
  91%{transform:translate(-3px,1px);clip-path:inset(20% 0 60% 0);}
  93%{transform:translate(2px,-1px);clip-path:inset(60% 0 20% 0);}
  95%{transform:translate(-2px,2px);clip-path:inset(40% 0 30% 0);}
  97%{transform:translate(3px,-2px);clip-path:inset(10% 0 70% 0);}
}
@keyframes glitch-2{
  0%,88%,100%{transform:translate(0,0);clip-path:inset(0 0 0 0);}
  89%{transform:translate(3px,-1px);clip-path:inset(30% 0 50% 0);}
  91%{transform:translate(-2px,1px);clip-path:inset(50% 0 30% 0);}
  93%{transform:translate(2px,-2px);clip-path:inset(70% 0 10% 0);}
  95%{transform:translate(-3px,2px);clip-path:inset(20% 0 60% 0);}
}

/* Status */
.coords{
  font-family:'Space Mono',monospace;
  font-size:11px;
  color:rgba(204,255,0,.45);
  letter-spacing:3px;
  margin-top:20px;
  text-transform:uppercase;
  display:inline-flex;
  align-items:center;
  gap:8px;
}
.dot-live{
  display:inline-block;
  width:8px;height:8px;
  background:var(--lima);
  border-radius:50%;
  animation:pulse 1.6s ease-in-out infinite;
  box-shadow:0 0 12px rgba(204,255,0,.6);
}
@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:.4;transform:scale(.85);}
}

/* ─── BLOCKS ─── */
.blocks{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.block{
  display:block;
  text-decoration:none;
  background:linear-gradient(180deg, var(--surface) 0%, #161616 100%);
  border:1px solid #1f1f1f;
  border-radius:20px;
  padding:28px 24px;
  position:relative;
  overflow:hidden;
  transition:transform .2s ease, border-color .2s ease, box-shadow .25s ease;
  -webkit-tap-highlight-color:transparent;
}
.block:active{transform:scale(.98);}
@media (hover:hover){
  .block:hover{
    transform:translateY(-2px);
    border-color:rgba(204,255,0,.35);
    box-shadow:0 10px 40px -10px rgba(204,255,0,.18);
  }
}
.block::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(204,255,0,.04) 0%, transparent 40%, rgba(119,0,204,.06) 100%);
  pointer-events:none;
}

/* Layout interno do bloco em flex (icone ao lado, texto ocupa o resto) */
.block-inner{
  position:relative;
  display:flex;
  align-items:center;
  gap:20px;
}
.block-content{
  flex:1 1 auto;
  min-width:0; /* permite truncamento se necessário */
}
.block-icon{
  flex:0 0 auto;
  width:64px;
  height:64px;
  background:linear-gradient(135deg, var(--lima) 0%, #99c200 100%);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 8px 32px rgba(204,255,0,.28);
  transition:transform .3s ease;
}
.block:hover .block-icon{transform:scale(1.06) rotate(-4deg);}
.block-icon svg{
  width:32px;
  height:32px;
  fill:var(--preto);
}

.block-label{
  font-family:'Space Mono',monospace;
  font-size:10px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--lima);
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:8px;
}
.block-label::before{
  content:'';
  width:6px;height:6px;
  background:var(--lima);
  border-radius:50%;
  box-shadow:0 0 8px rgba(204,255,0,.7);
}

.block-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(32px,7vw,44px);
  letter-spacing:3px;
  line-height:.95;
  color:var(--branco);
  margin-bottom:10px;
}

.block-sub{
  font-size:14px;
  color:var(--muted);
  line-height:1.5;
  font-weight:400;
}

/* CTA na linha de baixo, dentro de área full-width separada */
.block-cta{
  margin-top:18px;
  padding-top:18px;
  border-top:1px solid rgba(204,255,0,.08);
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-family:'Space Mono',monospace;
  font-size:12px;
  letter-spacing:3px;
  color:var(--lima);
  text-transform:uppercase;
  font-weight:700;
  position:relative;
}
.block-cta-arrow{
  display:inline-block;
  width:22px;height:1px;
  background:var(--lima);
  position:relative;
  transition:width .25s ease;
}
.block-cta-arrow::after{
  content:'';
  position:absolute;
  right:0;top:-3px;
  width:7px;height:7px;
  border-top:1px solid var(--lima);
  border-right:1px solid var(--lima);
  transform:rotate(45deg);
}
.block:hover .block-cta-arrow{width:34px;}

/* ─── FOOTER ─── */
.footer{
  margin-top:56px;
  text-align:center;
  font-family:'Space Mono',monospace;
  font-size:10px;
  color:rgba(245,245,245,.28);
  letter-spacing:3px;
  line-height:2;
  text-transform:uppercase;
}
.footer .grad{
  width:80px;
  height:2px;
  background:linear-gradient(90deg, var(--lima), var(--roxo));
  margin:0 auto 20px;
  opacity:.6;
}

/* Scanline */
@keyframes scan{
  0%{transform:translateY(-100%);}
  100%{transform:translateY(100vh);}
}
.scanline{
  position:fixed;
  top:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg, transparent, rgba(204,255,0,.15), transparent);
  pointer-events:none;
  z-index:2;
  animation:scan 8s linear infinite;
}

/* ─── MOBILE BREAKPOINTS ─── */
@media (max-width:480px){
  main{padding:32px 16px 56px;}
  .block{padding:24px 20px;}
  .block-inner{gap:16px;}
  .block-icon{width:56px;height:56px;}
  .block-icon svg{width:28px;height:28px;}
  .block-title{font-size:32px;}
  .block-sub{font-size:13px;}
}
@media (max-width:360px){
  .block-inner{gap:12px;}
  .block-icon{width:48px;height:48px;}
  .block-icon svg{width:24px;height:24px;}
}
</style>
